<style>

<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-gutter relative">
<!-- Dark Overlay for background contrast -->
<div class="absolute inset-0 bg-overlay pointer-events-none"></div>
<!-- Main Authentication Container (Floating Modal) -->
<main class="relative z-10 w-full max-w-[480px] animate-in fade-in zoom-in-95 duration-700">
<!-- Login Card -->
<div class="login-card p-8 md:p-12 overflow-hidden">
<!-- Brand Identity Section inside modal -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-14 h-14 bg-primary-container text-primary-fixed rounded-lg mb-6 shadow-sm">
<span class="font-display text-headline-lg font-bold">W</span>
</div>
<h1 class="font-display text-headline-lg text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-md text-on-surface-variant">Access your wealth portfolio and strategic insights.</p>
</div>
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-md text-on-surface-variant" for="email">EMAIL ADDRESS</label>
<input class="w-full px-4 py-3 bg-white border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline-variant transition-all input-focus-gold" id="email" name="email" placeholder="e.g. name@familyoffice.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="block font-label-md text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-label-sm text-secondary hover:text-on-secondary-container transition-colors underline underline-offset-4 decoration-outline-variant" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3 bg-white border border-outline-variant rounded-lg font-body-md text-on-surface placeholder:text-outline-variant transition-all input-focus-gold" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3">
<input class="w-5 h-5 rounded border-outline text-primary-container focus:ring-secondary-fixed cursor-pointer transition-all" id="remember" type="checkbox"/>
<label class="font-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<!-- Primary Action -->
<button class="w-full py-4 bg-primary text-on-primary font-label-md tracking-widest rounded-lg hover:bg-primary/90 transition-all active:scale-[0.98] duration-150" type="submit">
                SIGN IN TO WEALTHFLOW
            </button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 font-label-sm text-outline-variant uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Authentication -->
<button class="w-full py-3 px-4 border border-outline-variant rounded-lg flex items-center justify-center gap-3 hover:bg-surface-container-low transition-all group bg-white" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label-md text-on-surface-variant group-hover:text-on-surface">Continue with Google</span>
</button>
</form>
<div class="mt-10 text-center">
<p class="font-body-md text-on-surface-variant">
                New to WealthFlow? 
                <a class="font-label-md text-secondary hover:text-on-secondary-container transition-colors underline underline-offset-4 decoration-secondary-fixed ml-1" href="#">Create an account</a>
</p>
</div>
<!-- Inline Footer within modal for clean aesthetic -->
<footer class="mt-10 flex flex-wrap justify-center gap-x-6 gap-y-2 opacity-50 border-t border-outline-variant/10 pt-6">
<a class="font-label-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Privacy</a>
<a class="font-label-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Terms</a>
<a class="font-label-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Security</a>
</footer>
</div>
</main>
<script>
    // Micro-interaction for visibility toggle
    document.querySelector('button[type="button"]').addEventListener('click', function() {
        const passInput = document.getElementById('password');
        const icon = this.querySelector('.material-symbols-outlined');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            icon.textContent = 'visibility_off';
        } else {
            passInput.type = 'password';
            icon.textContent = 'visibility';
        }
    });

    // Subtly parallax/tilt for premium feel
    const card = document.querySelector('.login-card');
    document.addEventListener('mousemove', (e) => {
        if (window.innerWidth > 768) {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 120;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 120;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        }
    });

    document.addEventListener('mouseleave', () => {
        card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        card.style.transition = 'all 0.5s ease';
    });
    
    document.addEventListener('mouseenter', () => {
        card.style.transition = 'none';
    });
</script>
</body></html>
